<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - StudentHub</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->

  <header>
    <nav class="navbar">

      <div class="logo">
        StudentHub
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="tools.html">Tools</a></li>
        <li><a href="upload.html">Upload</a></li>
        <li id="loginNav">
            <a href="login.html">Login</a>
        </li>
        <li id="userArea"></li>
      </ul>

    </nav>
  </header>

  <!-- PAGE TITLE -->

  <section class="page-title">

    <h1>Engineering Notes</h1>

    <p>
      Download semester PDFs, assignments, and study material.
    </p>

  </section>

  <!-- SEARCH + FILTER -->

  <section class="filter-section">

    <input type="text" id="searchInput"
    placeholder="Search subject..." onkeyup="searchNotes()">
    <select>
      <option>All Semesters</option>
      <option>Semester 1</option>
      <option>Semester 2</option>
      <option>Semester 3</option>
      <option>Semester 4</option>
    </select>

    <select>
      <option>All Branches</option>
      <option>Mechanical</option>
      <option>Computer</option>
      <option>Civil</option>
      <option>Electrical</option>
    </select>

  </section>

  <!-- NOTES GRID -->

  <section class="notes-grid">

    <div class="note-card searchable">

      <h2>Mathematics</h2>

      <p>Semester 1 • Mechanical</p>

      <a href="assets/notes/maths.pdf" download>
      <button>Download PDF</button></a>

    </div>

    <div class="note-card searchable">

      <h2>physics</h2>

      <p>Semester 1 • Computer</p>

      <a href="assets/notes/physics.pdf" download>
      <button>Download PDF</button></a>

    </div>

    <div class="note-card searchable">

      <h2>Mechanics</h2>

      <p>Semester 2 • Civil</p>

      <a href="assets/notes/mechanics.pdf" download>
      <button>Download PDF</button></a>

    </div>

    <div class="note-card searchable">

      <h2>Programming</h2>

      <p>Semester 2 • Computer</p>

      <a href="assets/notes/programming.pdf" download>
      <button>Download PDF</button></a>

    </div>

  </section>

  <!-- FOOTER -->

  <footer>
    <p>© 2026 StudentHub</p>
  </footer>

  <script>

function searchNotes(){

  let input =
  document.getElementById("searchInput").value.toLowerCase();

  let cards =
  document.getElementsByClassName("searchable");

  for(let i = 0; i < cards.length; i++){

    let title =
    cards[i].getElementsByTagName("h2")[0];

    let text =
    title.innerText.toLowerCase();

    if(text.includes(input)){

      cards[i].style.display = "block";

    }
    else{

      cards[i].style.display = "none";

    }

  }

}

</script>

<script src="script.js"></script>

</body>
</html>
