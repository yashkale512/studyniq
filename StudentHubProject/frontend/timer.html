<!-- TIMER -->

<section class="calculator-section">

  <h1>Study Timer</h1>

  <p>
    Stay focused and improve productivity.
  </p>

  <div class="calculator-box">

    <h2 id="timerDisplay">
      25:00
    </h2>

    <button onclick="startTimer()">
      Start
    </button>

    <button onclick="pauseTimer()">
      Pause
    </button>

    <button onclick="resetTimer()">
      Reset
    </button>

  </div>

</section>

<script>

let time = 1500;

let timer;

function updateDisplay(){

  let minutes = Math.floor(time / 60);

  let seconds = time % 60;

  seconds = seconds < 10 ? "0" + seconds : seconds;

  document.getElementById("timerDisplay").innerText =
  minutes + ":" + seconds;

}

function startTimer(){

  if(timer){

    return;

  }

  timer = setInterval(() => {

    if(time > 0){

      time--;

      updateDisplay();

    }
    else{

      clearInterval(timer);

      alert("Study Session Complete!");

    }

  },1000);

}

function pauseTimer(){

  clearInterval(timer);

  timer = null;

}

function resetTimer(){

  clearInterval(timer);

  timer = null;

  time = 1500;

  updateDisplay();

}

updateDisplay();

</script>

<script src="script.js"></script>

</body>
</html>
